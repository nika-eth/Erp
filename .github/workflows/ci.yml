name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # No hay Postgres real en este job (los tests mockean `pg`); estos
      # valores sólo satisfacen `required()` en `config/env.ts`, que ya no
      # tiene fallback hardcodeado para secretos.
      JWT_SECRET: ci-test-secret-no-usar-en-produccion
      PGPASSWORD: ci-test-password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck:test
      - run: npm run test
      - run: npm run build

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
